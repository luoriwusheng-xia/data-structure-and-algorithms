name: Deploy VitePress Site

on:
  push:
    # 推送到主分支后自动发布，避免每次手动登录 GitHub 操作。
    branches:
      - master
  workflow_dispatch:
    # 保留手动触发入口，便于首次上线或排查部署问题时重跑。

permissions:
  # 允许读取仓库代码。
  contents: read
  # 允许向 GitHub Pages 上传构建产物。
  pages: write
  # 允许本次工作流生成部署所需的临时身份令牌。
  id-token: write

concurrency:
  # 同一套 Pages 部署任务只保留最新的一次，避免旧任务覆盖新版本。
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # v5 已切到 node24 运行时
        uses: actions/checkout@v5

      # 准备并激活 pnpm 10.33.2
      # --activate 将其添加到 $PATH，使其在后续步骤中可用
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Setup Node.js
        # v6 已切到 node24 运行时
        uses: actions/setup-node@v6
        with:
          # 这里固定使用 npm 当前可查询到的 Node 24 最新版本，避免 CI 环境漂移。
          node-version: 24.15.0
          cache: 'pnpm'  # 👈 新增：加速依赖安装

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VitePress site
        # VitePress 当前配置会把产物输出到仓库根目录下的 dist。
        run: pnpm docs:build
        env:
          CI: true # 👈 新增：确保 CI 环境变量

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    # 只有 build 成功后才继续部署，减少空部署和失败部署。
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

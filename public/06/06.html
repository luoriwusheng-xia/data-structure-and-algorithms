<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./06.css">
</head>

<body>
  <div id="app">
    <div class="demo-page-container">
      <div class="container">
        <div v-for="(item, index) in list" :key="index" class="parent-item">
          <div :data-row="index" :data-col="sIndex" class="item"
            v-for="(son, sIndex) in item" :key="sIndex"
            :style="{ backgroundColor: son.backgroundColor }"
            @mousemove="onHandleMouseMove(index, sIndex, $event)">
            ({{index}}, {{sIndex}})
          </div>
        </div>
      </div>
    </div>
  </div>
  <script
    src="https://cdn.jsdelivr.net/npm/vue@3.4.13/dist/vue.global.min.js"></script>

  <script>
    const { createApp, ref } = Vue

    const app = createApp({
      setup () {
        const list = ref([])

        for (let i = 0; i < 12; i++) {
          let item = new Array(10).fill('').map((p) => {
            return {
              backgroundColor: getRandomColor(),
            }
          })

          list.value.push(item)
        }

        /**
        * 获取鼠标当前所在元素的周围元素
        */
        function getAroundItems (row, col, el) {
          const arr = []

          // 1. 先拿左右节点
          let prevNode = el.previousSibling
          let nextNode = el.nextSibling

          console.log('前一个节点', prevNode);
          console.log('后一个节点', nextNode);

          arr.push(prevNode)
          arr.push(nextNode)

          //  拿到其他4个相邻元素
          if (row % 2 === 0) {
            // 偶数

            // 上面2个
            let topLeftNode = el.parentNode?.children[col - 1]
            let topRightNode = el.parentNode?.children[col]

            arr.push(topLeftNode)
            arr.push(topRightNode)

            // 下面2个
            let bottomLeftNode = el.parentNode?.nextSibling?.children[col - 1]
            let bottomRightNode = el.parentNode?.nextSibling?.children[col]

            arr.push(bottomLeftNode)
            arr.push(bottomRightNode)
          } else {
            // 奇数

            // 上面2个
            let topLeftNode = el.parentNode?.children[col]
            let topRightNode = el.parentNode?.children[col + 1]

            arr.push(topLeftNode)
            arr.push(topRightNode)

            // 下面2个
            let bottomRightNode = el.parentNode?.nextSibling?.children[col]
            let bottomLeftNode = el.parentNode?.nextSibling?.children[col + 1]

            arr.push(bottomRightNode)
          }


          return arr
        }



        const onHandleMouseMove = (row, col, event) => {
          // 周围节点
          let nodes = getAroundItems(row, col, event.target)
        }

        return {
          list,
          onHandleMouseMove
        }
      }
    }).mount('#app')



    function getRandomColor () {
      var letters = '0123456789ABCDEF'
      var color = '#'
      for (var i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)]
      }
      return color
    }



    const containerEl = document.querySelector('.container')


  </script>
</body>

</html>
